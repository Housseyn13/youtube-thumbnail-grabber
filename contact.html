<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - YouTube Thumbnail Grabber</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white font-bold text-2xl">YT</div>
                <span class="font-bold text-2xl">Thumbnail Grabber</span>
            </div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-6 py-24">
        <h1 class="text-5xl font-bold mb-4">Get in Touch</h1>
        <p class="text-gray-600 mb-10">Have questions? Suggestions? We'd love to hear from you.</p>
        
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Your Email</label>
                <input type="email" class="w-full px-5 py-4 border rounded-2xl" placeholder="you@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Message</label>
                <textarea class="w-full px-5 py-4 border rounded-2xl h-40" placeholder="How can we help?"></textarea>
            </div>
            <button type="button" 
                    class="w-full bg-red-600 text-white py-4 rounded-2xl font-semibold">Send Message</button>
        </form>
    </div>
</body>
</html>
